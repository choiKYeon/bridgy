version: '3.8'

services:

  # ── PostgreSQL ──
  postgres:
    image: postgres:16-alpine
    container_name: bridgy-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: bridgy
      POSTGRES_USER: bridgy
      POSTGRES_PASSWORD: bridgy
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bridgy"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (캐싱) ──
  redis:
    image: redis:7-alpine
    container_name: bridgy-redis
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Zookeeper (Kafka 의존) ──
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: bridgy-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  # ── Kafka ──
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: bridgy-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    depends_on:
      - zookeeper
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── Kafka UI (개발용 모니터링) ──
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: bridgy-kafka-ui
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: bridgy-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    depends_on:
      - kafka

volumes:
  postgres_data:
  redis_data:
