spring:
  application:
    name: bridgy

  # --- Database ---
  datasource:
    url: jdbc:postgresql://localhost:5432/bridgy
    username: ${DB_USERNAME:bridgy}
    password: ${DB_PASSWORD:bridgy}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # --- Jackson ---
  jackson:
    property-naming-strategy: SNAKE_CASE
    default-property-inclusion: non_null

server:
  port: 8080

# --- KakaoTalk Channel API (Mock) ---
kakao:
  app-key: ${KAKAO_APP_KEY:mock-app-key}
  admin-key: ${KAKAO_ADMIN_KEY:mock-admin-key}
  callback-url: ${KAKAO_CALLBACK_URL:http://localhost:8080/api/kakao/webhook}

# --- AI Service ---
ai:
  provider: ${AI_PROVIDER:mock}
  api-key: ${AI_API_KEY:mock-api-key}
  model: ${AI_MODEL:gpt-4}

# --- Logging ---
logging:
  level:
    org.grr.bridgy: DEBUG
    org.springframework.web: INFO
