spring:
  datasource:
    url: jdbc:h2:mem:bridgy
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: true
      path: /h2-console

  # Redis (Docker Compose)
  data:
    redis:
      host: localhost
      port: 6379

  # Kafka (Docker Compose)
  kafka:
    bootstrap-servers: localhost:9092
